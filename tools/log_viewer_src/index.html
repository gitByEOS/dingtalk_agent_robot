<!doctype html>
<html lang="zh-CN">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日志查看器 - Vite+</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>日志查看器</h1>

    </div>
    <script type="module" src="/src/main.ts"></script>
